<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tienda - Mi Tienda</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Meta tags para PWA -->
    <meta name="theme-color" content="#8e44ad">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- jsQR para mejor detección -->
    <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="splash-icon">🛍️</div>
            <h1>Mi Tienda</h1>
            <p>Cargando tu experiencia de compra...</p>
            <div class="splash-spinner"></div>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="header-left">
                <button id="menuBtn" class="icon-btn">☰</button>
            </div>
            <div class="header-title">
                <h1>🛍️ Mi Tienda</h1>
            </div>
            <div class="header-right">
                <span id="connection-status" class="connection-status online">📶</span>
            </div>
        </div>
        
        <!-- Barra de búsqueda (visible en todas las páginas) -->
        <div class="search-bar" id="searchBar">
            <input type="text" id="searchInput" placeholder="Buscar productos..." class="search-input">
            <button id="searchBtn" class="search-btn">🔍</button>
        </div>
    </header>

    <!-- Contenido principal -->
    <main id="mainContent">
        <!-- Las páginas se cargarán aquí dinámicamente -->
    </main>

    <!-- Menú inferior equilibrado (5 opciones) -->
    <nav class="bottom-nav">
        <!-- Izquierda -->
        <a href="#" class="nav-item" data-page="escanear">
            <span class="nav-icon">📷</span>
            <span class="nav-label">Escanear</span>
        </a>
        
        <a href="#" class="nav-item" data-page="favoritos">
            <span class="nav-icon">❤️</span>
            <span class="nav-label">Favoritos</span>
        </a>
        
        <!-- Centro - DASHBOARD (destacado) -->
        <a href="#" class="nav-item active" data-page="dashboard">
            <span class="nav-icon nav-icon-center">🏠</span>
            <span class="nav-label">Inicio</span>
        </a>
        
        <!-- Derecha -->
        <a href="#" class="nav-item" data-page="carrito">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">Carrito</span>
            <span id="cartBadge" class="badge">0</span>
        </a>
        
        <a href="#" class="nav-item" data-page="historial">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Historial</span>
        </a>
    </nav>

    <!-- Botón de instalar PWA -->
    <button id="install-button" class="install-button" style="display: none;">
        <span class="install-icon">📲</span>
        <span class="install-text">INSTALAR APP</span>
    </button>

    <!-- Notificaciones -->
    <div id="notification" class="notification"></div>

    <!-- Modales -->
    <div id="productoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalProductoNombre"></h2>
                <button class="close-modal" onclick="cerrarModal()">✖</button>
            </div>
            <div class="modal-body" id="modalProductoBody">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>
    
    <!-- Modal para producto escaneado -->
    <div id="productoEscanearModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📦 Producto Escaneado</h2>
                <button class="close-modal" onclick="cerrarProductoEscanearModal()">✖</button>
            </div>
            <div class="modal-body" id="productoEscanearBody">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
